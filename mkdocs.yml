site_name: TODO List - Gerenciador de Tarefas
site_description: Aplicação web de gerenciamento de tarefas com lembretes, desenvolvida com SDD
site_author: SDD Team
repo_url: https://github.com/seu-usuario/todo-list-sdd
repo_name: todo-list-sdd
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: light
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: dark
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search:
      lang: pt

nav:
  - Home: index.md
  - Início Rápido: quickstart.md
  - Documentação:
      - Arquitetura: documentation/architecture.md
      - API: documentation/api.md
  - Desenvolvimento:
      - Setup Local: development/setup.md
      - Estrutura do Projeto: development/project-structure.md
      - Testes: development/testing.md
  - Deployment:
      - GitHub Pages: deployment/github-pages.md
      - Vercel: deployment/vercel.md
      - Troubleshooting: deployment/troubleshooting.md
  - FAQ: faq.md
  - Changelog: changelog.md
